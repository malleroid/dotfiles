# mise global configuration
# https://mise.jdx.dev/configuration.html

[settings]
# Enable support for legacy version files (.node-version, .ruby-version, etc.)
legacy_version_file = true

# Disable experimental features for stability
experimental = false

# Use precompiled Ruby binaries (avoid dyld issues from system library changes)
ruby.compile = false
ruby.github_attestations = true

# Use shorter paths for better readability
verbose = false

[tools]
# Global tool versions
"node" = "lts"
"python" = "latest"
"ruby" = "latest"
"rust" = "latest"
"go" = "latest"
"terraform" = "latest"
"uv" = "latest"

# MCP Servers
"npm:@upstash/context7-mcp" = "latest"
"npm:chrome-devtools-mcp" = "latest"
"npm:notion-mcp-server" = "latest"
"npm:@playwright/mcp" = "latest"

# Claude Code Extensions
"npm:claudekit" = "latest"
"npm:tdd-guard" = "latest"
"npm:tweakcc" = "latest"

# Development Tools
"carapace" = "latest"
"npm:hunkdiff" = "latest"
"aqua:supabase/cli" = "latest"
"npm:@antiwork/shortest" = "latest"
"npm:@devcontainers/cli" = "latest"
"npm:@e2b/cli" = "latest"
"npm:@github/copilot" = "latest"
"npm:@openai/codex" = "latest"
"npm:aicommit2" = "latest"

# Language Servers for Neovim LSP
# GitHub Copilot
"npm:@github/copilot-language-server" = "latest"

# TypeScript/JavaScript (using vtsls)
"npm:@vtsls/language-server" = "latest"
"npm:typescript" = "latest"

# Python
"pipx:pyright" = "latest"
"pipx:mlx-whisper" = "latest"
"pipx:mlx-qwen3-asr" = { version = "latest", extras = "aligner" }
"pipx:toot-tooi" = "latest"

# Rust
"github:rust-lang/rust-analyzer" = "latest"

# Go
"go:golang.org/x/tools/gopls" = "latest"
"go:github.com/d-kuro/gwq/cmd/gwq" = "latest"

# Lua
"github:LuaLS/lua-language-server" = "latest"

# Ruby
"gem:ruby-lsp" = "latest"
"gem:rails-mcp-server" = "latest"

# HTML/CSS/JSON/ESLint
"npm:vscode-langservers-extracted" = "latest"

# Terraform
"go:github.com/hashicorp/terraform-ls" = "latest"
"github:cloudflare/cf-terraforming" = "latest"
