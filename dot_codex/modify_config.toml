#!/bin/sh
# chezmoi modify_ script for ~/.codex/config.toml
# Managed sections are overwritten; [projects.*] is preserved from existing file.
# Requires: dasel

existing=$(cat)

# --- Managed base config ---
cat << 'EOF'
model = "gpt-5.5"
personality = "pragmatic"
model_reasoning_effort = "medium"
sandbox_mode = "workspace-write"

[sandbox_workspace_write]
exclude_slash_tmp = true
exclude_tmpdir_env_var = true

[shell_environment_policy]
experimental_use_profile = true

[mcp_servers.awslabs-aws-documentation-mcp-server]
command = "uvx"
args = ["awslabs.aws-documentation-mcp-server@latest"]

[mcp_servers.awslabs-aws-documentation-mcp-server.env]
FASTMCP_LOG_LEVEL = "ERROR"

[mcp_servers.chrome-devtools-mcp]
command = "chrome-devtools-mcp"
args = ["--headless=true", "--isolated=true"]

[mcp_servers.playwright-mcp]
command = "playwright-mcp"
args = ["--headless"]

[mcp_servers.rails-mcp-server]
command = "rails-mcp-server"

[mcp_servers.serena]
command = "uvx"
args = ["--from", "git+https://github.com/oraios/serena", "serena", "start-mcp-server", "--enable-web-dashboard", "false"]

[plugins."github@openai-curated"]
enabled = true

[features]
codex_hooks = true
EOF

# --- Preserve [projects.*] from existing file ---
if [ -n "$existing" ] && printf '%s' "$existing" | dasel -i toml 'projects' >/dev/null 2>&1; then
  printf '\n'
  printf '%s' "$existing" | sed -n '/^\[projects\./,$p'
fi
